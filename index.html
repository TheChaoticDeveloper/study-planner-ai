<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study & Planning AI</title>

<style>

body{
  font-family: Arial, sans-serif;
  background:#111;
  color:white;
  padding:2rem;
  margin:0;
}

h1{
  color:#ff4d4d;
}

#chat{
  border:1px solid #ff4d4d;
  background:#222;
  height:350px;
  overflow-y:auto;
  padding:1rem;
  border-radius:8px;
  margin-bottom:1rem;
}

.user{
  color:#00bfff;
  margin:8px 0;
}

.ai{
  color:#4dff4d;
  margin:8px 0;
}

/* Typing indicator container */
#typing{
  display:none;
  margin-bottom:10px;
}

/* bouncing dots */
.dot{
  height:8px;
  width:8px;
  background:#ff4d4d;
  border-radius:50%;
  display:inline-block;
  margin:0 3px;
  animation:bounce 1.2s infinite ease-in-out;
}

.dot:nth-child(2){ animation-delay:0.2s; }
.dot:nth-child(3){ animation-delay:0.4s; }

@keyframes bounce{
  0%,80%,100%{ transform:translateY(0); }
  40%{ transform:translateY(-8px); }
}

#inputContainer{
  display:flex;
  gap:10px;
}

#userMessage{
  flex:1;
  padding:10px;
  border-radius:5px;
  border:1px solid #ff4d4d;
  background:#111;
  color:white;
}

button{
  background:#ff4d4d;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:#ff2a2a;
}

</style>
</head>

<body>

<h1>Study & Planning AI</h1>

<div id="chat"></div>

<!-- Typing animation -->
<div id="typing">
  <span class="dot"></span>
  <span class="dot"></span>
  <span class="dot"></span>
</div>

<div id="inputContainer">
  <input id="userMessage" placeholder="Type your question...">
  <button id="sendBtn">Send</button>
  <button id="clearBtn">Clear Chat</button>
</div>

<script>

const chatDiv = document.getElementById("chat");
const input = document.getElementById("userMessage");
const sendBtn = document.getElementById("sendBtn");
const clearBtn = document.getElementById("clearBtn");
const typing = document.getElementById("typing");

const backendUrl = "https://study-planner-ai-backend.vercel.app/api/chat";

function appendMessage(text, sender){
  const p = document.createElement("p");
  p.innerHTML = text.replace(/\n/g, "<br>");
  p.className = sender;
  chatDiv.appendChild(p);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

async function sendMessage(){

  const message = input.value.trim();
  if(!message) return;

  appendMessage("You: " + message, "user");
  input.value = "";
  typing.style.display = "block";

  try{

    const response = await fetch(backendUrl, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ message })
    });

    if(!response.ok){
      throw new Error("Server error");
    }

    let data;
    try{
      data = await response.json();
    }catch{
      throw new Error("Invalid response");
    }

    setTimeout(() => {
      typing.style.display = "none";

      if(data.reply){
        appendMessage("AI: " + data.reply, "ai");
      } else {
        appendMessage("Error: " + data.error, "ai");
      }

    }, 500);

  } catch(error){
    typing.style.display = "none";
    appendMessage("Error connecting to backend", "ai");
  }
}

sendBtn.addEventListener("click", sendMessage);

input.addEventListener("keydown", e => {
  if(e.key === "Enter"){
    sendMessage();
  }
});

clearBtn.addEventListener("click", () => {
  chatDiv.innerHTML = "";
});

</script>

</body>
</html>
