<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Study & Planning AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      background: #111; /* dark background */
      color: #fff;
      margin: 0;
    }

    h1 {
      color: #ff4d4d; /* bright red */
    }

    #chat {
      border: 1px solid #ff4d4d;
      padding: 1rem;
      height: 300px;
      overflow-y: auto;
      background: #222;
      border-radius: 8px;
      margin-bottom: 1rem;
    }

    #userMessage {
      width: 70%;
      padding: 0.5rem;
      border-radius: 4px;
      border: 1px solid #ff4d4d;
      background: #111;
      color: #fff;
    }

    button {
      padding: 0.5rem 1rem;
      background: #ff4d4d;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-left: 0.5rem;
    }

    .user {
      color: #00bfff;
      margin: 0.5rem 0;
    }

    .ai {
      color: #4dff4d;
      margin: 0.5rem 0;
    }

    #typing {
      color: gray;
      display: none;
    }

    /* Container for input + buttons */
    #inputContainer {
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body>

  <h1>Study & Planning AI</h1>

  <div id="chat"></div>
  <p id="typing">AI is typing...</p>

  <div id="inputContainer">
    <input type="text" id="userMessage" placeholder="Type your question...">
    <button id="sendBtn">Send</button>
    <button id="clearBtn">Clear Chat</button>
  </div>

  <script>
    const chatDiv = document.getElementById('chat');
    const input = document.getElementById('userMessage');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const backendUrl = "https://study-planner-ai-backend.vercel.app/api/chat"; // your backend

    function appendMessage(text, sender) {
      const p = document.createElement('p');
      p.textContent = text;
      p.className = sender;
      chatDiv.appendChild(p);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      appendMessage("You: " + message, "user");
      input.value = "";

      const typing = document.getElementById("typing");
      typing.style.display = "block";

      try {
        const response = await fetch(backendUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });

        const data = await response.json();
        typing.style.display = "none";

        if (data.reply) {
          appendMessage("AI: " + data.reply, "ai");
        } else {
          appendMessage("Error: " + data.error, "ai");
        }
      } catch (err) {
        typing.style.display = "none";
        appendMessage("Error connecting to backend", "ai");
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

    clearBtn.addEventListener('click', () => {
      chatDiv.innerHTML = "";
    });
  </script>

</body>
</html>
